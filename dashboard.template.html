<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SF Rentals Dashboard</title>
<style>
  :root {
    --bg: #eef3fb;
    --panel: #ffffff;
    --panel-2: #f3f7fd;
    --border: #cfdae8;
    --text: #0b2545;
    --muted: #5c7a99;
    --accent: #1e4d99;
    --accent-strong: #0b2545;
    --accent-2: #0e8f5d;
    --warn: #e58905;
    --danger: #d23b3b;
    --star: #f5b400;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px; line-height: 1.45; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header.topbar {
    position: sticky; top: 0; z-index: 10;
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 18px 28px 14px;
    box-shadow: 0 1px 3px rgba(11, 37, 69, 0.04);
  }
  .title-row { display: flex; align-items: flex-start; gap: 16px; }
  .title-row .titles { flex: 1; min-width: 0; }
  .title-row h1 {
    margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.4px;
    color: var(--accent-strong);
  }
  .title-row .count {
    margin-top: 2px; font-size: 13px; color: var(--muted);
  }
  .stats {
    display: flex; gap: 14px; color: var(--muted); font-size: 12px;
    flex-wrap: wrap; margin-top: 4px;
  }
  .stats b { color: var(--text); font-weight: 600; }

  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-top: 14px; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 220px;
    position: relative;
  }
  @media (max-width: 640px) {
    header.topbar { padding: 14px 16px 12px; }
    .title-row h1 { font-size: 22px; }
    main { padding: 16px 16px 60px; }
    .search-wrap { flex-basis: 100%; }
  }
  .search-wrap input {
    width: 100%;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    font-size: 14px; outline: none;
    height: 42px;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: ""; position: absolute; left: 13px; top: 50%;
    width: 16px; height: 16px; transform: translateY(-50%);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c7a99' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-size: contain;
  }

  .tool-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 0 14px; height: 42px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: border-color 80ms, background 80ms;
  }
  .tool-btn:hover { border-color: var(--accent); }
  .tool-btn.is-active { border-color: var(--accent); background: var(--panel-2); }
  .tool-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sort-wrap { position: relative; }
  .sort-wrap select.tool-btn {
    appearance: none; -webkit-appearance: none;
    padding-right: 34px;
    min-width: 180px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b2545' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 12px;
  }
  .sort-wrap select.tool-btn:focus { outline: none; border-color: var(--accent); }

  .add-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff;
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 0 16px; height: 42px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .add-btn:hover { background: #163d7a; border-color: #163d7a; }

  .travel-popover {
    position: absolute;
    z-index: 30;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(11, 37, 69, 0.18);
    padding: 14px 16px;
    min-width: 360px;
    display: none;
  }
  .travel-popover.is-open { display: block; }
  .travel-popover h3 {
    margin: 0 0 10px;
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .travel-popover .commute-row {
    display: grid;
    grid-template-columns: minmax(140px, 1.4fr) 1fr 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .travel-popover .commute-row:last-child { margin-bottom: 0; }
  .travel-popover .commute-row .dest-label {
    font-size: 13px; color: var(--text); font-weight: 500;
  }
  .travel-popover .commute-row select {
    width: 100%; height: 36px;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0 30px 0 10px; font-size: 13px; outline: none;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b2545' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 10px;
  }
  .travel-popover .commute-row select:focus { border-color: var(--accent); }

  .panel-backdrop {
    position: fixed; inset: 0;
    background: rgba(11, 37, 69, 0.28);
    z-index: 40;
    opacity: 0; pointer-events: none;
    transition: opacity 160ms ease;
  }
  .panel-backdrop.is-open { opacity: 1; pointer-events: auto; }

  .filter-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 360px; max-width: 92vw;
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 50;
    transform: translateX(100%);
    transition: transform 200ms ease;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 24px rgba(11, 37, 69, 0.10);
  }
  .filter-panel.is-open { transform: translateX(0); }

  .filter-panel header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
  }
  .filter-panel header h2 {
    margin: 0; font-size: 18px; font-weight: 700; color: var(--accent-strong);
  }
  .filter-panel .close-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted); padding: 4px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .filter-panel .close-btn:hover { color: var(--text); background: var(--panel-2); }
  .filter-panel .close-btn svg { width: 18px; height: 18px; }

  .filter-panel .body {
    flex: 1; overflow-y: auto;
    padding: 18px 22px;
    display: flex; flex-direction: column; gap: 22px;
  }

  .filter-panel .group { display: flex; flex-direction: column; gap: 8px; }
  .filter-panel .group > .label {
    font-size: 13px; font-weight: 600; color: var(--text);
  }

  .filter-panel .price-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .filter-panel .price-inputs input {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 14px; outline: none;
    width: 100%; height: 40px;
  }
  .filter-panel .price-inputs input:focus { border-color: var(--accent); }

  .rating-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .rating-chip {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 13px;
    cursor: pointer; min-width: 44px; text-align: center;
    transition: background 80ms, color 80ms, border-color 80ms;
  }
  .rating-chip:hover { border-color: var(--accent); }
  .rating-chip.is-active {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 600;
  }

  .radio-list { display: flex; flex-direction: column; gap: 6px; }
  .radio-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 4px; cursor: pointer;
    font-size: 14px; color: var(--text);
    border-radius: 6px;
  }
  .radio-row:hover { background: var(--panel-2); }
  .radio-row input[type="radio"] {
    margin: 0; width: 16px; height: 16px;
    accent-color: var(--accent);
  }

  .extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .extras-grid label {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 12px; color: var(--muted);
  }
  .extras-grid select {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; height: 38px;
    outline: none;
  }
  .extras-grid select:focus { border-color: var(--accent); }

  .filter-panel footer {
    padding: 14px 22px 18px;
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    background: var(--panel);
  }
  .filter-panel footer button {
    height: 44px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border);
  }
  .filter-panel .btn-reset {
    background: var(--panel); color: var(--text);
  }
  .filter-panel .btn-reset:hover { border-color: var(--accent); }
  .filter-panel .btn-apply {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .filter-panel .btn-apply:hover { background: #163d7a; border-color: #163d7a; }
  .control { display: flex; flex-direction: column; gap: 2px; }
  .control label { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; }
  .control input, .control select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 6px; font-size: 12px; outline: none;
    height: 26px;
  }
  .control input:focus, .control select:focus { border-color: var(--accent); }
  .control.range-row { flex-direction: row; gap: 4px; align-items: center; }
  .control.range-row .stack { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .control.range-row input { width: 100%; }

  .control.stacked { gap: 3px; }
  .control.stacked .inline-row { display: flex; align-items: center; gap: 6px; }
  .control.stacked .inline-row .mini {
    font-size: 10px; color: var(--muted); min-width: 34px;
  }
  .control.stacked .inline-row input,
  .control.stacked .inline-row select { flex: 1; height: 22px; font-size: 12px; }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 3px 10px; font-size: 12px; cursor: pointer;
    user-select: none;
  }
  .chip.active { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 600; }

  main { padding: 22px 28px 60px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
    align-items: start;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    box-shadow: 0 1px 2px rgba(11, 37, 69, 0.04);
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 6px 16px rgba(30, 77, 153, 0.10); }

  .card-photo {
    position: relative;
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, #cfe0f5 0%, #e3ecf8 50%, #f0e8da 100%);
    overflow: hidden;
  }
  .card-photo img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card-photo .placeholder-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(11, 37, 69, 0.18);
  }
  .card-photo .placeholder-icon svg { width: 56px; height: 56px; }

  .photo-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px;
    background: rgba(255, 255, 255, 0.92);
    border: none; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(11, 37, 69, 0.18);
    opacity: 0; transition: opacity 120ms ease, transform 120ms ease;
    color: var(--text);
  }
  .card:hover .photo-nav { opacity: 1; }
  .photo-nav:hover { transform: translateY(-50%) scale(1.06); }
  .photo-nav.prev { left: 10px; }
  .photo-nav.next { right: 10px; }
  .photo-nav svg { width: 16px; height: 16px; }
  .photo-nav[disabled] { display: none; }

  .photo-counter {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(11, 37, 69, 0.72);
    color: #fff;
    font-size: 11px; font-weight: 500;
    padding: 3px 8px;
    border-radius: 999px;
    pointer-events: none;
  }

  .photo-dots {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
    pointer-events: none;
  }
  .photo-dots .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
  }
  .photo-dots .dot.is-on { background: #fff; }

  .status-pill {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.92);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px; font-weight: 600;
    color: var(--text);
    box-shadow: 0 1px 3px rgba(11,37,69,0.08);
    backdrop-filter: blur(4px);
  }
  .status-pill.s-available { color: #1f7a4d; }
  .status-pill.s-applied { color: #1e4d99; }
  .status-pill.s-scheduled_tour { color: #6a3fb5; }
  .status-pill.s-not_interesting { color: #5c7a99; }
  .status-pill.s-off_market { color: var(--danger); }
  .status-pill.s-review_together { color: #2e8b57; }

  .heart-btn {
    position: absolute; top: 10px; right: 10px;
    width: 34px; height: 34px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    border: none;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(11,37,69,0.10);
    transition: transform 80ms ease;
  }
  .heart-btn:hover { transform: scale(1.06); }
  .heart-btn svg { width: 18px; height: 18px; stroke: #5c7a99; fill: none; stroke-width: 2; }
  .heart-btn.is-on svg { stroke: var(--danger); fill: var(--danger); }

  .card-body {
    padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .addr-line {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 13px;
  }
  .addr-line svg { width: 14px; height: 14px; flex-shrink: 0; }
  .addr-line .addr-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .price-line {
    font-size: 22px; font-weight: 700; color: var(--text);
    line-height: 1.1;
  }
  .price-line .per { font-size: 14px; font-weight: 500; color: var(--text); }

  .stars-line { display: inline-flex; gap: 2px; }
  .stars-line .star {
    font-size: 18px; line-height: 1; color: #d3dde8;
  }
  .stars-line .star.filled { color: var(--star); }

  .specs-line {
    display: flex; gap: 14px; align-items: center;
    color: var(--muted); font-size: 13px;
    padding-top: 10px; border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .specs-line .spec { display: inline-flex; align-items: center; gap: 4px; }
  .specs-line svg { width: 14px; height: 14px; }

  .notes-preview {
    font-size: 13px; color: var(--muted); font-style: italic;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-top: 2px;
  }

  .status-select {
    width: 100%;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 32px 8px 12px;
    font-size: 13px;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230b2545' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 12px;
    cursor: pointer;
    margin-top: 4px;
  }
  .status-select:focus { outline: none; border-color: var(--accent); }

  .notes-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 80ms;
  }
  .notes-btn:hover { background: #163d7a; }

  .facts { display: flex; gap: 6px; flex-wrap: wrap; }
  .fact {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--muted);
  }
  .fact b { color: var(--text); font-weight: 600; }

  .actions { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-top: 2px; }
  .actions .spacer { flex: 1; }
  .link-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .link-btn:hover { color: var(--accent); border-color: var(--accent); }

  .details {
    display: none;
    border-top: 1px solid var(--border);
    padding: 14px 16px 16px;
    gap: 12px; flex-direction: column;
    background: #fbfcfe;
  }
  .card.open .details { display: flex; }
  .card.open .toggle::after { content: "\u25B2"; }
  .toggle::after { content: "\u25BC"; margin-left: 6px; font-size: 10px; }

  .commute-grid {
    display: grid;
    grid-template-columns: 1fr repeat(3, auto);
    gap: 3px 10px;
    font-size: 10.5px;
    align-items: baseline;
    line-height: 1.35;
  }
  .commute-grid .h { color: var(--muted); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.4px; }
  .commute-grid .v { font-variant-numeric: tabular-nums; text-align: right; }
  .commute-grid .v.na { color: #aab8cc; }

  .desc {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-size: 12.5px; color: var(--text); white-space: pre-wrap;
    max-height: 260px; overflow-y: auto;
  }
  .desc.empty { color: var(--muted); font-style: italic; }
  .desc-source {
    font-size: 10px; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
  }

  .extras-block {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    display: flex; flex-direction: column; gap: 6px;
    font-size: 12px;
  }
  .extras-header {
    font-size: 10px; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .extras-row {
    display: grid; grid-template-columns: 110px 1fr; gap: 10px;
    align-items: start;
  }
  .extras-label { color: var(--muted); font-size: 11px; }
  .extras-chip {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; font-size: 11px;
    margin-right: 4px; display: inline-block;
  }
  .extras-chip b { color: var(--text); font-weight: 600; }
  .extras-schools > div { padding: 1px 0; }
  .extras-block .na, .extras-block .muted { color: var(--muted); }
  .extras-block .muted { font-size: 10px; }
  .extras-gallery {
    display: flex; gap: 6px;
    overflow-x: auto; overflow-y: hidden;
    padding: 4px 0 6px;
    scrollbar-width: thin;
  }
  .extras-gallery a { flex-shrink: 0; line-height: 0; }
  .extras-gallery img {
    height: 140px; width: auto; object-fit: cover;
    border-radius: 4px; border: 1px solid var(--border);
    background: var(--panel-2);
  }
  .extras-gallery img:hover { border-color: var(--accent); }

  .kv-grid {
    display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px;
    font-size: 12px;
  }
  .kv-grid .k { color: var(--muted); }

  .empty-state {
    text-align: center; color: var(--muted); padding: 60px 20px;
    border: 1px dashed var(--border); border-radius: 10px;
  }

  .score-box { display: flex; flex-direction: column; gap: 4px; }
  .scorer-row {
    display: grid;
    grid-template-columns: 64px auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;

<script>

const META = /*__META_PLACEHOLDER__*/null;

const SUPABASE_URL = "https://sklvnnnxcgnkbccvvwpx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrbHZubm54Y2dua2JjY3Z2d3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjc0MDIsImV4cCI6MjA5MTk0MzQwMn0.-I3mDHdYOxYv9WV6vrUQejTtd7uRYNP0rkR-GM6KRSU";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fmtPrice = (n) => n == null ? "—" :
  "$" + Math.round(n).toLocaleString();
const fmtMin = (n) => (n == null || isNaN(n)) ? null : (n < 10 ? n.toFixed(1) : Math.round(n).toString());
const fmtKm = (n) => (n == null || isNaN(n)) ? null : n.toFixed(1);

function num(row, key) {
  const v = row["_num:" + key];
  return (v === undefined || v === null) ? null : v;
}

const SCORERS = ["Morten", "Victoria"];

const _storedScorer = (localStorage.getItem("sf-scorer") || "").trim();
const state = {
  search: "",
  region: "",
  priceMin: null,
  priceMax: null,
  minBeds: null,
  minBaths: null,
  minStars: null,
  // destination -> { mode: "Drive"|"Transit"|"Walk", maxMinutes: number|null }
  commute: {},
  sort: "price-asc",
  statusFilter: "all",
  openIds: new Set(),
  scorer: SCORERS.includes(_storedScorer) ? _storedScorer : "",
  // listing_id -> { scorer -> { score, notes, updated_at } }
  scores: new Map(),
  // listing_url -> { description, scraped_at }
  extras: new Map(),
  // listing_id -> { off_market, not_interesting, review_together, scheduled_tour, applied }
  flags: new Map(),
  // listing_id -> bool (local-only for now)
  hearts: new Set(),
  // listing_id -> int (current photo index in carousel)
  photoIndex: new Map(),
};

async function loadScores() {
  const { data, error } = await db
    .from("scores")
    .select("listing_id, scorer, score, notes, updated_at");
  if (error) { console.error("loadScores failed:", error); return; }
  state.scores = new Map();
  for (const row of data || []) {
    if (!state.scores.has(row.listing_id)) state.scores.set(row.listing_id, new Map());
    state.scores.get(row.listing_id).set(row.scorer, row);
  }
}

async function loadExtras() {
  const { data, error } = await db
    .from("listing_extras")
    .select("listing_url, description, raw, scraped_at");
  if (error) { console.error("loadExtras failed:", error); return; }
  state.extras = new Map();
  for (const row of data || []) state.extras.set(row.listing_url, row);
}

const STATUS_KEYS = ["off_market", "not_interesting", "review_together", "scheduled_tour", "applied"];
const LEGACY_FLAG_COLUMNS = ["off_market", "not_interesting", "review_together"];
// Detected at load time. Falls back to legacy if scheduled_tour/applied columns
// haven't been added to Supabase yet — see chunk7-supabase.sql.
let PERSISTED_FLAG_KEYS = LEGACY_FLAG_COLUMNS.slice();

async function loadFlags() {
  const fullCols = "listing_id, " + STATUS_KEYS.join(", ");
  let res = await db.from("listing_flags").select(fullCols);
  if (res.error) {
    res = await db.from("listing_flags").select("listing_id, " + LEGACY_FLAG_COLUMNS.join(", "));
    if (res.error) { console.error("loadFlags failed:", res.error); return; }
    PERSISTED_FLAG_KEYS = LEGACY_FLAG_COLUMNS.slice();
    console.info("listing_flags: scheduled_tour/applied not in DB yet — run chunk7-supabase.sql to enable persistence.");
  } else {
    PERSISTED_FLAG_KEYS = STATUS_KEYS.slice();
  }
  state.flags = new Map();
  for (const row of res.data || []) state.flags.set(row.listing_id, row);
}

async function setStatus(listingId, status) {
  const existing = state.flags.get(listingId) || {};
  const next = { listing_id: listingId, updated_at: new Date().toISOString() };
  for (const k of STATUS_KEYS) next[k] = (status === k);
  state.flags.set(listingId, { ...existing, ...next });
  render();
  const payload = { listing_id: next.listing_id, updated_at: next.updated_at };
  for (const k of PERSISTED_FLAG_KEYS) payload[k] = next[k];
  const { error } = await db.from("listing_flags").upsert(payload, { onConflict: "listing_id" });
  if (error) console.error("setStatus failed:", error);
}

function activeStatus(flags) {
  if (!flags) return null;
  for (const k of STATUS_KEYS) if (flags[k]) return k;
  return null;
}

function findAll(obj, key) {
  const seen = new WeakSet();
  const acc = [];
  const walk = (x) => {
    if (x == null || typeof x !== "object" || seen.has(x)) return;
    seen.add(x);
    if (Array.isArray(x)) { x.forEach(walk); return; }
    for (const k of Object.keys(x)) {
      if (k === key) acc.push(x[k]);
      let v = x[k];
      if (typeof v === "string" && (v.startsWith("{") || v.startsWith("["))) {
        try { v = JSON.parse(v); } catch (e) { continue; }
      }
      walk(v);
    }
  };
  walk(obj);
  return acc;
}

function extractExtras(raw) {
  if (!raw) return null;

  const firstNumeric = (key) => {
    for (const v of findAll(raw, key)) {
      if (typeof v === "number") return v;
      if (v && typeof v === "object") {
        const n = v.value ?? v.walkscore ?? v.transit_score ?? v.bikescore ?? v.score;
        if (typeof n === "number") return n;
      }
    }
    return null;
  };
  const walkScore = firstNumeric("walkScore");
  const transitScore = firstNumeric("transitScore");
  const bikeScore = firstNumeric("bikeScore");

  const photos = extractPhotos(raw);

  const schoolsRaw = findAll(raw, "schools").find(Array.isArray) || [];
  const schools = schoolsRaw
    .filter((s) => s && (s.name || s.schoolName))
    .map((s) => ({
      name: s.name || s.schoolName,
      rating: s.rating ?? s.greatSchoolsRating ?? null,
      level: s.level || s.type || s.grades || "",
      distance: s.distance ?? null,
    }));

  const priceHistory = findAll(raw, "priceHistory").find(Array.isArray) || [];
  const listedForRent = priceHistory
    .filter((p) => p && /listed for rent/i.test(p.event || ""))
    .map((p) => p.date)
    .sort()
    .pop() || null;

  const parkingPieces = [];
  for (const k of ["parkingFeatures", "parking_features", "parking", "otherParking", "parkingInformation"]) {
    for (const v of findAll(raw, k)) {
      if (Array.isArray(v)) parkingPieces.push(...v.filter((x) => typeof x === "string"));
      else if (typeof v === "string" && v.length < 200) parkingPieces.push(v);
    }
  }
  const firstBool = (key) => findAll(raw, key).find((v) => typeof v === "boolean");
  const firstNum = (key) => findAll(raw, key).find((v) => typeof v === "number");
  const hasGarage = firstBool("hasGarage") ?? firstBool("has_garage");
  const hasAttachedGarage = firstBool("hasAttachedGarage");
  const hasCarport = firstBool("hasCarport");
  const capacity =
    firstNum("parkingCapacity") ??
    firstNum("garageParkingCapacity") ??
    firstNum("garageSpaces") ??
    firstNum("coveredSpaces") ??
    firstNum("parking_capacity");
  // Scan Zillow's atAGlanceFacts/resoFacts categories for a "Parking" fact.
  let glanceParking = null;
  for (const arr of findAll(raw, "atAGlanceFacts")) {
    if (!Array.isArray(arr)) continue;
    const hit = arr.find((f) => f && /parking/i.test(f.factLabel || f.category || ""));
    if (hit && hit.factValue) { glanceParking = hit.factValue; break; }
  }
  if (glanceParking) parkingPieces.push(glanceParking);
  const parking = {
    features: [...new Set(parkingPieces)],
    hasGarage: hasGarage ?? null,
    hasAttachedGarage: hasAttachedGarage ?? null,
    hasCarport: hasCarport ?? null,
    capacity: capacity ?? null,
  };

  return { walkScore, transitScore, bikeScore, schools, listedForRent, parking, photos };
}

function normalizePhoto(p) {
  if (!p || typeof p !== "object") return null;
  const sources = p.mixedSources?.jpeg || p.mixedSources?.webp;
  if (Array.isArray(sources) && sources.length) {
    const ok = sources.filter((s) => s && typeof s.url === "string");
    if (!ok.length) return null;
    const sorted = [...ok].sort((a, b) => (a.width || 0) - (b.width || 0));
    const medium = sorted.reduce((best, cur) =>
      Math.abs((cur.width || 0) - 768) < Math.abs((best.width || 0) - 768) ? cur : best
    , sorted[0]);
    return {
      small: sorted[0].url,
      medium: medium.url,
      large: sorted[sorted.length - 1].url,
      caption: p.caption || "",
    };
  }
  const url = p.url || p.src || p.imgSrc || p.highResImageLink;
  if (typeof url === "string" && url.startsWith("http")) {
    return { small: url, medium: url, large: url, caption: p.caption || "" };
  }
  return null;
}

function extractPhotos(raw) {
  const seen = new Set();
  const out = [];
  const push = (arr) => {
    if (!Array.isArray(arr)) return;
    for (const item of arr) {
      const n = normalizePhoto(item);
      if (n && !seen.has(n.large)) { seen.add(n.large); out.push(n); }
    }
  };
  for (const key of ["responsivePhotos", "photos", "responsivePhotosOriginalRatio"]) {
    for (const arr of findAll(raw, key)) push(arr);
    if (out.length) return out;
  }
  return out;
}

function getExtras(r) {
  const entry = state.extras.get(r._id);
  if (!entry || !entry.raw) return null;
  if (!entry._extracted) entry._extracted = extractExtras(entry.raw);
  return entry._extracted;
}

async function saveScore(listingId, newScore) {
  const scorer = state.scorer;
  if (!scorer) { alert("Pick Morten or Victoria in the top bar first."); return; }
  if (!state.scores.has(listingId)) state.scores.set(listingId, new Map());
  const bucket = state.scores.get(listingId);
  const existing = bucket.get(scorer) || {};
  const score = newScore == null ? 0 : newScore;
  const notes = existing.notes || "";

  if (score === 0 && !notes) {
    bucket.delete(scorer);
    render();
    const { error } = await db.from("scores").delete().match({ listing_id: listingId, scorer });
    if (error) console.error("delete failed:", error);
  } else {
    const payload = { listing_id: listingId, scorer, score, notes, updated_at: new Date().toISOString() };
    bucket.set(scorer, payload);
    render();
    const { error } = await db.from("scores").upsert(payload, { onConflict: "listing_id,scorer" });
    if (error) console.error("upsert failed:", error);
  }
}

async function saveNote(listingId, notes) {
  const scorer = state.scorer;
  if (!scorer) return;
  if (!state.scores.has(listingId)) state.scores.set(listingId, new Map());
  const bucket = state.scores.get(listingId);
  const existing = bucket.get(scorer) || {};
  const score = existing.score || 0;
  const trimmed = (notes || "").trim();

  if (score === 0 && !trimmed) {
    if (!bucket.has(scorer)) return;
    bucket.delete(scorer);
    const { error } = await db.from("scores").delete().match({ listing_id: listingId, scorer });
    if (error) console.error("delete failed:", error);
    return;
  }

  const payload = { listing_id: listingId, scorer, score, notes: trimmed, updated_at: new Date().toISOString() };
  bucket.set(scorer, payload);
  const { error } = await db.from("scores").upsert(payload, { onConflict: "listing_id,scorer" });
  if (error) console.error("saveNote failed:", error);
}

// Build stable id per row (URL or fallback to index).
RAW_DATA.forEach((r, i) => { r._id = r["Listing URL"] || ("row-" + i); });

function computeStats(rows) {
  const prices = rows.map((r) => r._priceValue).filter((v) => v != null);
  prices.sort((a, b) => a - b);
  const median = prices.length ? prices[Math.floor(prices.length / 2)] : null;
  const avg = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : null;
  return {
    count: rows.length,
    median, avg,
    minP: prices[0] ?? null,
    maxP: prices[prices.length - 1] ?? null,
  };
}

function applyFilters() {
  const tokens = state.search.trim().toLowerCase().split(/\s+/).filter(Boolean);
  let rows = RAW_DATA.filter((r) => {
    if (tokens.length) {
      const hay = [
        r["Address"], r["Short Address"],
        r["City"], r["County"], r["State"], r["Zip"],
        r["Subdivision (Premium Data)"],
        r["_region"],
      ].filter(Boolean).join(" ").toLowerCase();
      if (!tokens.every((t) => hay.includes(t))) return false;
    }
    if (state.region && r["_region"] !== state.region) return false;
    const p = r._priceValue;
    if (state.priceMin != null && (p == null || p < state.priceMin)) return false;
    if (state.priceMax != null && (p == null || p > state.priceMax)) return false;
    if (state.minBeds != null) {
      const b = num(r, "Beds");
      if (b == null || b < state.minBeds) return false;
    }
    if (state.minBaths != null) {
      const b = num(r, "Baths");
      if (b == null || b < state.minBaths) return false;
    }
    if (state.minStars != null && state.scorer) {
      const myScore = state.scores.get(r._id)?.get(state.scorer)?.score ?? 0;
      if (myScore < state.minStars) return false;
    }
    const f = state.flags.get(r._id) || {};
    const rowStatus = activeStatus(f);
    if (state.statusFilter && state.statusFilter !== "all") {
      if (state.statusFilter === "available") {
        if (rowStatus) return false;
      } else if (rowStatus !== state.statusFilter) {
        return false;
      }
    }
    for (const dest of META.destinations) {
      const cfg = state.commute[dest];
      if (!cfg || cfg.maxMinutes == null) continue;
      const t = num(r, `${dest} - ${cfg.mode} Time (min)`);
      if (t == null || t > cfg.maxMinutes) return false;
    }
    return true;
  });

  const byPrice = (a, b) => {
    const va = a._priceValue; const vb = b._priceValue;
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return va - vb;
  };
  const byDate = (a, b) => {
    const va = a._sortDate; const vb = b._sortDate;
    if (!va && !vb) return 0;
    if (!va) return 1;
    if (!vb) return -1;
    if (va < vb) return -1;
    if (va > vb) return 1;
    return 0;
  };

  const myStars = (r) => {
    if (!state.scorer) return 0;
    return state.scores.get(r._id)?.get(state.scorer)?.score ?? 0;
  };
  const byStars = (a, b) => myStars(a) - myStars(b);

  if (state.sort === "price-desc") rows.sort((a, b) => -byPrice(a, b));
  else if (state.sort === "date-desc") rows.sort((a, b) => -byDate(a, b) || byPrice(a, b));
  else if (state.sort === "date-asc") rows.sort((a, b) => byDate(a, b) || byPrice(a, b));
  else if (state.sort === "stars-desc") rows.sort((a, b) => -byStars(a, b) || byPrice(a, b));
  else rows.sort(byPrice);

  return rows;
}

function renderStats(visible) {
  const totalStats = computeStats(RAW_DATA);
  const vis = computeStats(visible);
  const el = document.getElementById("stats");
  const medianStr = vis.median != null ? fmtPrice(vis.median) : "—";
  el.innerHTML = `
    <span><b>${vis.count}</b> of ${totalStats.count} listings</span>
    <span>Median <b>${medianStr}</b></span>
    <span>Range <b>${fmtPrice(vis.minP)} – ${fmtPrice(vis.maxP)}</b></span>
  `;
}

function commuteFullGrid(r) {
  const header = `
    <div class="h"></div>
    <div class="h" style="text-align:right">Drive</div>
    <div class="h" style="text-align:right">Transit</div>
    <div class="h" style="text-align:right">Walk</div>
  `;
  const body = META.destinations.map((d) => {
    const cell = (mode) => {
      const t = num(r, `${d} - ${mode} Time (min)`);
      const km = num(r, `${d} - ${mode} Distance (km)`);
      if (t == null) return `<div class="v na">—</div>`;
      const kmStr = km != null ? ` <span style="color:var(--muted);font-size:9.5px">(${fmtKm(km)} km)</span>` : "";
      return `<div class="v">${fmtMin(t)} min${kmStr}</div>`;
    };
    return `
      <div style="color:var(--text)">${d}</div>
      ${cell("Drive")}
      ${cell("Transit")}
      ${cell("Walk")}
    `;
  }).join("");
  return `<div class="commute-grid">${header}${body}</div>`;
}

function description(r) {
  const scraped = (state.extras.get(r._id)?.description || "").trim();
  const raw = scraped || (r["Description (Premium Data)"] || "").trim();
  if (!raw) return `<div class="desc empty">No description available.</div>`;
  const badge = scraped ? `<div class="desc-source">From Zillow listing page</div>` : "";
  return `${badge}<div class="desc">${escapeHtml(raw)}</div>`;
}

function extrasBlock(r) {
  const e = getExtras(r);
  if (!e) return "";

  const rows = [];

  const scores = [
    ["Walk", e.walkScore],
    ["Transit", e.transitScore],
    ["Bike", e.bikeScore],
  ].filter(([, v]) => typeof v === "number");
  if (scores.length) {
    const html = scores.map(([l, v]) => `<span class="extras-chip">${l} <b>${Math.round(v)}</b></span>`).join("");
    rows.push(`<div class="extras-row"><div class="extras-label">Scores</div><div>${html}</div></div>`);
  }

  if (e.listedForRent) {
    rows.push(`<div class="extras-row"><div class="extras-label">Listed for rent</div><div>${escapeHtml(e.listedForRent)}</div></div>`);
  }

  if (e.schools.length) {
    const html = e.schools.map((s) => {
      const rating = s.rating != null ? `<b>${s.rating}/10</b>` : `<span class="na">—</span>`;
      const level = s.level ? ` <span class="muted">(${escapeHtml(String(s.level))})</span>` : "";
      const dist = s.distance != null ? ` <span class="muted">· ${s.distance} mi</span>` : "";
      return `<div>${rating} ${escapeHtml(s.name)}${level}${dist}</div>`;
    }).join("");
    rows.push(`<div class="extras-row"><div class="extras-label">Schools</div><div class="extras-schools">${html}</div></div>`);
  }

  const parkingParts = [];
  if (e.parking.hasGarage === true) parkingParts.push(e.parking.hasAttachedGarage ? "Attached garage" : "Garage");
  else if (e.parking.hasCarport === true) parkingParts.push("Carport");
  if (e.parking.capacity != null) parkingParts.push(`${e.parking.capacity} space${e.parking.capacity === 1 ? "" : "s"}`);
  if (e.parking.features.length) parkingParts.push(...e.parking.features);
  if (parkingParts.length) {
    rows.push(`<div class="extras-row"><div class="extras-label">Parking</div><div>${escapeHtml([...new Set(parkingParts)].join(" · "))}</div></div>`);
  } else if (e.parking.hasGarage === false) {
    rows.push(`<div class="extras-row"><div class="extras-label">Parking</div><div class="na">No garage listed</div></div>`);
  }

  let gallery = "";
  if (e.photos && e.photos.length) {
    const imgs = e.photos.map((p, i) => {
      const alt = p.caption ? escapeHtml(p.caption) : `photo ${i + 1}`;
      return `<a href="${escapeHtml(p.large)}" target="_blank" rel="noopener" title="${alt}"><img loading="lazy" src="${escapeHtml(p.medium)}" alt="${alt}"></a>`;
    }).join("");
    gallery = `<div class="extras-gallery">${imgs}</div>`;
  }

  if (!rows.length && !gallery) return "";
  return `<div class="extras-block"><div class="extras-header">More from Zillow${e.photos?.length ? ` · ${e.photos.length} photos` : ""}</div>${rows.join("")}${gallery}</div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function fmtDate(raw) {
  if (!raw) return null;
  const iso = raw.match(/(\d{4}-\d{2}-\d{2})/);
  if (!iso) return raw;
  const d = new Date(iso[1] + "T00:00:00");
  if (isNaN(d)) return raw;
  return d.toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric", year: "numeric" });
}

function listingDateInfo(r) {
  const entry = state.extras.get(r._id);
  if (entry && entry.raw) {
    const e = extractExtras(entry.raw);
    if (e && e.listedForRent) return { label: "Listed", date: e.listedForRent };
  }
  const days = num(r, "Days on Zillow");
  const scraped = r["Date Scraped"] || "";
  const scrapeIso = (scraped.match(/(\d{4}-\d{2}-\d{2})/) || [])[1];
  if (days != null && scrapeIso) {
    const d = new Date(scrapeIso + "T00:00:00");
    d.setDate(d.getDate() - Math.round(days));
    return { label: "Listed ~", date: d.toISOString().slice(0, 10) };
  }
  if (scrapeIso) return { label: "Scraped", date: scrapeIso };
  return null;
}

function kvRows(r) {
  const entries = [
    ["Type", r["Type"]],
    ["Status", r["Status"]],
    ["Year built", r["Year Built (Premium Data)"]],
    ["Zestimate", r["Zestimate"]],
    ["Rent Zestimate", r["Rent Zestimate"]],
    ["MLS Id", r["MLS Id"]],
    ["Broker", r["Broker Name"] || r["Listed By (Premium Data)"]],
    ["Neighborhood", r["Subdivision (Premium Data)"]],
    ["Date scraped", r["Date Scraped"]],
  ].filter(([, v]) => v && String(v).trim() !== "");
  if (!entries.length) return "";
  return `<div class="kv-grid">` +
    entries.map(([k, v]) => `<div class="k">${k}</div><div>${escapeHtml(String(v))}</div>`).join("") +
    `</div>`;
}

function mapLink(r) {
  const lat = num(r, "Latitude"), lng = num(r, "Longitude");
  if (lat == null || lng == null) return "";
  return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener" class="link-btn">Map</a>`;
}

function scoreWidget(r) {
  const bucket = state.scores.get(r._id) || new Map();
  const rows = SCORERS.map((name) => {
    const entry = bucket.get(name);
    const score = entry ? entry.score : 0;
    const note = entry && entry.notes ? entry.notes : "";
    const isMe = state.scorer === name;
    const stars = [1, 2, 3, 4, 5].map((n) => {
      const cls = `star${n <= score ? " filled" : ""}`;
      const attrs = isMe
        ? ` data-score="${n}" data-id="${escapeHtml(r._id)}"`
        : "";
      return `<span class="${cls}"${attrs} title="${n}/5">★</span>`;
    }).join("");
    const noteField = isMe
      ? `<input class="scorer-note" type="text" value="${escapeHtml(note)}" data-note-id="${escapeHtml(r._id)}" placeholder="Why this score…">`
      : `<div class="scorer-note read-only${note ? "" : " empty"}" title="${escapeHtml(note)}">${note ? escapeHtml(note) : "—"}</div>`;
    return `
      <div class="scorer-row ${isMe ? "me" : "other"}">
        <span class="scorer-name">${name}</span>
        <span class="score-stars ${isMe ? "" : "disabled"}">${stars}</span>
        ${noteField}
      </div>`;
  }).join("");
  return `<div class="score-box">${rows}</div>`;
}

const STATUS_LABELS = {
  available: "Available",
  scheduled_tour: "Scheduled Tour",
  applied: "Applied",
  review_together: "Review Together",
  off_market: "Off Market",
  not_interesting: "Not Interested",
};

function statusPill(status) {
  const key = status || "available";
  const label = STATUS_LABELS[key];
  return `<span class="status-pill s-${key}">${label}</span>`;
}

function statusSelect(id, status) {
  const value = status || "available";
  const opts = ["available", "scheduled_tour", "applied", "review_together", "off_market", "not_interesting"]
    .map((k) => `<option value="${k}"${k === value ? " selected" : ""}>${STATUS_LABELS[k]}</option>`)
    .join("");
  return `<select class="status-select" data-status-id="${escapeHtml(id)}">${opts}</select>`;
}

function starsRow(r) {
  const score = state.scorer
    ? (state.scores.get(r._id)?.get(state.scorer)?.score ?? 0)
    : 0;
  return `<div class="stars-line">${[1,2,3,4,5].map((n) =>
    `<span class="star${n <= score ? " filled" : ""}">★</span>`
  ).join("")}</div>`;
}

function notePreview(r) {
  const bucket = state.scores.get(r._id);
  if (!bucket) return "";
  let note = state.scorer ? (bucket.get(state.scorer)?.notes || "") : "";
  if (!note) {
    for (const entry of bucket.values()) {
      if (entry?.notes) { note = entry.notes; break; }
    }
  }
  return note ? `<div class="notes-preview">${escapeHtml(note)}</div>` : "";
}

function specsLine(r) {
  const beds = num(r, "Beds");
  const baths = num(r, "Baths");
  const sqft = num(r, "Footage");
  const parts = [];
  if (beds != null) {
    parts.push(`<span class="spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17h20"/><path d="M4 17V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9"/><path d="M2 21v-4"/><path d="M22 21v-4"/></svg>${beds} bd</span>`);
  }
  if (baths != null) {
    parts.push(`<span class="spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M4 12V6a2 2 0 0 1 4 0v1"/><path d="M2 12v4a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4v-4"/></svg>${baths} ba</span>`);
  }
  if (sqft != null) {
    parts.push(`<span class="spec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>${sqft.toLocaleString()} sqft</span>`);
  }
  return `<div class="specs-line">${parts.join("")}</div>`;
}

function photosFromRow(r) {
  // Tolerant of multiple future column shapes; activates once the second scrape adds photos.
  const candidates = [
    r["Photos"], r["Photo URLs"], r["Image URL"], r["Image URLs"],
    r["Photo"], r["Image"], r["Hero Photo"], r["Main Photo"],
  ];
  for (const v of candidates) {
    if (!v) continue;
    if (Array.isArray(v) && v.length) return v.map(String).filter(Boolean);
    const s = String(v).trim();
    if (!s) continue;
    if (s.startsWith("[")) {
      try {
        const arr = JSON.parse(s);
        if (Array.isArray(arr) && arr.length) return arr.map(String).filter(Boolean);
      } catch (_e) {}
    }
    if (s.includes(",")) {
      const list = s.split(",").map((x) => x.trim()).filter((x) => x.startsWith("http"));
      if (list.length) return list;
    }
    if (s.startsWith("http")) return [s];
  }
  // Fallback to scraped extras
  const extras = getExtras(r);
  if (extras?.photos?.length) {
    return extras.photos.map((p) => p.medium || p.large || p.small).filter(Boolean);
  }
  return [];
}

function renderCard(r) {
  const url = r["Listing URL"] || "";
  const short = r["Short Address"] || r["Address"] || "(no address)";
  const region = r["_region"] && r["_region"] !== "Other" ? r["_region"] : "";
  const city = r["City"] || "";
  const locale = region || city;
  const isOpen = state.openIds.has(r._id);
  const fl = state.flags.get(r._id) || {};
  const status = activeStatus(fl);
  const dimClass = (status === "off_market" || status === "not_interesting") ? " is-dim" : "";
  const isFavorite = state.hearts.has(r._id);

  const photos = photosFromRow(r);
  const photoIdx = Math.min(state.photoIndex.get(r._id) || 0, Math.max(photos.length - 1, 0));
  const idAttr = escapeHtml(r._id);
  let photoHtml;
  if (!photos.length) {
    photoHtml = `<div class="placeholder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v11a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg></div>`;
  } else {
    const cur = photos[photoIdx];
    const showNav = photos.length > 1;
    const navHtml = showNav ? `
      <button type="button" class="photo-nav prev" data-photo-id="${idAttr}" data-dir="-1" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button type="button" class="photo-nav next" data-photo-id="${idAttr}" data-dir="1" aria-label="Next photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="photo-counter" data-photo-counter="${idAttr}">${photoIdx + 1} / ${photos.length}</div>
    ` : "";
    photoHtml = `<img src="${escapeHtml(cur)}" alt="listing photo" loading="lazy" data-photo-img="${idAttr}">${navHtml}`;
  }

  const priceStr = fmtPrice(r._priceValue);
  const isRental = r["Type"] === "APARTMENT" || r._priceValue != null && r._priceValue < 50000;

  return `
  <article class="card ${isOpen ? "open" : ""}${dimClass}" data-id="${escapeHtml(r._id)}">
    <div class="card-photo" data-toggle="${escapeHtml(r._id)}">
      ${photoHtml}
      ${statusPill(status)}
      <button type="button" class="heart-btn${isFavorite ? " is-on" : ""}" data-heart-id="${escapeHtml(r._id)}" aria-label="Favorite" aria-pressed="${isFavorite}">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
    <div class="card-body" data-toggle="${escapeHtml(r._id)}">
      <div class="addr-line">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span class="addr-text">${escapeHtml(short)}${locale ? ` • ${escapeHtml(locale)}` : ""}</span>
      </div>
      <div class="price-line">${priceStr}${isRental && r._priceValue != null ? `<span class="per">/mo</span>` : ""}</div>
      ${starsRow(r)}
      ${specsLine(r)}
      ${notePreview(r)}
      ${statusSelect(r._id, status)}
      <button type="button" class="notes-btn" data-notes-id="${escapeHtml(r._id)}">${isOpen ? "Edit Notes" : (notePreview(r) ? "Edit Notes" : "Add Notes")}</button>
    </div>
    <div class="details">
      <div class="score-panel">
        ${scoreWidget(r)}
      </div>
      ${commuteFullGrid(r)}
      <div class="actions">
        ${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="link-btn">Zillow ↗</a>` : ""}
        ${mapLink(r)}
      </div>
      ${kvRows(r)}
      ${extrasBlock(r)}
      ${description(r)}
    </div>
  </article>`;
}

function render() {
  const visible = applyFilters();
  renderStats(visible);
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count-line");
  countEl.textContent = `${visible.length} listing${visible.length === 1 ? "" : "s"} found`;
  if (!visible.length) {
    grid.innerHTML = `<div class="empty-state">No listings match your filters.</div>`;
    return;
  }
  grid.innerHTML = visible.map(renderCard).join("");
  grid.querySelectorAll("[data-toggle]").forEach((el) => {
    el.addEventListener("click", (e) => {
      // Ignore clicks that originated on interactive child elements.
      if (e.target.closest("a, button, select, input, .heart-btn, .star[data-score]")) return;
      const id = el.getAttribute("data-toggle");
      if (state.openIds.has(id)) state.openIds.delete(id); else state.openIds.add(id);
      render();
    });
  });
  grid.querySelectorAll(".notes-btn[data-notes-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.getAttribute("data-notes-id");
      const wasOpen = state.openIds.has(id);
      if (!wasOpen) state.openIds.add(id);
      render();
      if (!wasOpen) {
        const card = grid.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
        card?.querySelector(".scorer-note[data-note-id]")?.focus();
      }
    });
  });
  grid.querySelectorAll(".heart-btn[data-heart-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.getAttribute("data-heart-id");
      if (state.hearts.has(id)) state.hearts.delete(id); else state.hearts.add(id);
      btn.classList.toggle("is-on");
      btn.setAttribute("aria-pressed", state.hearts.has(id) ? "true" : "false");
    });
  });
  grid.querySelectorAll(".photo-nav[data-photo-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.getAttribute("data-photo-id");
      const dir = Number(btn.getAttribute("data-dir"));
      const row = visible.find((r) => r._id === id);
      if (!row) return;
      const photos = photosFromRow(row);
      if (photos.length < 2) return;
      const cur = state.photoIndex.get(id) || 0;
      const next = (cur + dir + photos.length) % photos.length;
      state.photoIndex.set(id, next);
      const card = grid.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
      const img = card?.querySelector(`[data-photo-img="${CSS.escape(id)}"]`);
      if (img) img.src = photos[next];
      const counter = card?.querySelector(`[data-photo-counter="${CSS.escape(id)}"]`);
      if (counter) counter.textContent = `${next + 1} / ${photos.length}`;
    });
  });
  grid.querySelectorAll(".status-select[data-status-id]").forEach((sel) => {
    sel.addEventListener("click", (e) => e.stopPropagation());
    sel.addEventListener("change", (e) => {
      e.stopPropagation();
      const id = sel.getAttribute("data-status-id");
      const value = sel.value === "available" ? null : sel.value;
      setStatus(id, value);
    });
  });
  grid.querySelectorAll(".star[data-score]").forEach((star) => {
    star.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = star.getAttribute("data-id");
      const n = Number(star.getAttribute("data-score"));
      const current = state.scores.get(id)?.get(state.scorer)?.score;
      saveScore(id, current === n ? null : n);
    });
  });
  grid.querySelectorAll(".scorer-note[data-note-id]").forEach((input) => {
    input.addEventListener("blur", () => {
      const id = input.getAttribute("data-note-id");
      const existing = state.scores.get(id)?.get(state.scorer)?.notes || "";
      if (input.value === existing) return;
      saveNote(id, input.value);
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    });
  });
}

const MAX_MIN_OPTIONS = [
  ["", "Any"], ["15", "≤ 15 min"], ["20", "≤ 20 min"],
  ["30", "≤ 30 min"], ["45", "≤ 45 min"], ["60", "≤ 60 min"],
];
const MODE_OPTIONS = ["Drive", "Transit", "Walk"];

function populateCommuteRows() {
  const wrap = document.getElementById("commute-filters");
  wrap.innerHTML = META.destinations.map((d) => {
    const cfg = state.commute[d] || { mode: "Drive", maxMinutes: null };
    const modeOpts = MODE_OPTIONS.map((m) =>
      `<option value="${m}"${cfg.mode === m ? " selected" : ""}>${m}</option>`
    ).join("");
    const minOpts = MAX_MIN_OPTIONS.map(([v, label]) =>
      `<option value="${v}"${String(cfg.maxMinutes ?? "") === v ? " selected" : ""}>${label}</option>`
    ).join("");
    const safe = escapeHtml(d);
    return `
      <div class="commute-row">
        <div class="dest-label">${safe}</div>
        <select data-dest="${safe}" data-role="mode">${modeOpts}</select>
        <select data-dest="${safe}" data-role="max">${minOpts}</select>
      </div>`;
  }).join("");
  wrap.querySelectorAll("select[data-dest]").forEach((sel) => {
    sel.addEventListener("input", (e) => {
      const dest = sel.getAttribute("data-dest");
      const role = sel.getAttribute("data-role");
      if (!state.commute[dest]) state.commute[dest] = { mode: "Drive", maxMinutes: null };
      if (role === "mode") state.commute[dest].mode = e.target.value;
      else state.commute[dest].maxMinutes = e.target.value ? Number(e.target.value) : null;
      render();
    });
  });
}

const FILTER_DEFAULTS = {
  search: "",
  priceMin: null,
  priceMax: null,
  minBeds: null,
  minBaths: null,
  minStars: null,
  region: "",
  statusFilter: "all",
};

function syncRatingChips() {
  const cur = state.minStars == null ? "" : String(state.minStars);
  document.querySelectorAll("#rating-chips .rating-chip").forEach((chip) => {
    chip.classList.toggle("is-active", chip.getAttribute("data-stars") === cur);
  });
}
function syncRegionRadios() {
  document.querySelectorAll('#region-radios input[name="region"]').forEach((r) => {
    r.checked = (r.value === (state.region || ""));
  });
}
function syncStatusRadios() {
  document.querySelectorAll('#status-radios input[name="status"]').forEach((r) => {
    r.checked = (r.value === (state.statusFilter || "all"));
  });
}
function syncFilterInputs() {
  document.getElementById("f-price-min").value = state.priceMin ?? "";
  document.getElementById("f-price-max").value = state.priceMax ?? "";
  document.getElementById("f-beds").value = state.minBeds == null ? "" : String(state.minBeds);
  document.getElementById("f-baths").value = state.minBaths == null ? "" : String(state.minBaths);
  document.getElementById("scorer-name").value = state.scorer || "";
  syncRatingChips();
  syncRegionRadios();
  syncStatusRadios();
}

function wireControls() {
  const bind = (id, handler) => document.getElementById(id).addEventListener("input", handler);
  document.getElementById("f-sort").value = state.sort;
  bind("f-search", (e) => { state.search = e.target.value; render(); });
  bind("f-price-min", (e) => { state.priceMin = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-price-max", (e) => { state.priceMax = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-beds", (e) => { state.minBeds = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-baths", (e) => { state.minBaths = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-sort", (e) => { state.sort = e.target.value; render(); });

  // Region radios — populate from META.regions then bind.
  const regionList = document.getElementById("region-radios");
  const regions = [...(META.regions || [])];
  if (RAW_DATA.some((r) => r["_region"] === "Other") && !regions.includes("Other")) {
    regions.push("Other");
  }
  for (const region of regions) {
    const lbl = document.createElement("label");
    lbl.className = "radio-row";
    lbl.innerHTML = `<input type="radio" name="region" value="${escapeHtml(region)}"> ${escapeHtml(region)}`;
    regionList.appendChild(lbl);
  }
  regionList.addEventListener("change", (e) => {
    if (e.target.name !== "region") return;
    state.region = e.target.value;
    render();
  });

  // Status radios.
  document.getElementById("status-radios").addEventListener("change", (e) => {
    if (e.target.name !== "status") return;
    state.statusFilter = e.target.value;
    render();
  });

  // Rating chips.
  document.getElementById("rating-chips").addEventListener("click", (e) => {
    const chip = e.target.closest(".rating-chip");
    if (!chip) return;
    const v = chip.getAttribute("data-stars");
    state.minStars = v === "" ? null : Number(v);
    syncRatingChips();
    render();
  });

  // Scorer.
  document.getElementById("scorer-name").addEventListener("input", (e) => {
    state.scorer = e.target.value.trim();
    localStorage.setItem("sf-scorer", state.scorer);
    render();
  });

  // Reset / Apply.
  document.getElementById("filter-reset").addEventListener("click", () => {
    Object.assign(state, FILTER_DEFAULTS);
    document.getElementById("f-search").value = "";
    syncFilterInputs();
    render();
  });
  document.getElementById("filter-apply").addEventListener("click", () => {
    closeFilterPanel();
  });

  syncFilterInputs();
}

let closeFilterPanel = () => {};

META.destinations.forEach((d) => {
  state.commute[d] = { mode: "Drive", maxMinutes: null };
});
populateCommuteRows();
wireControls();

(function wireToolbar() {
  const filtersBtn = document.getElementById("btn-filters");
  const travelBtn = document.getElementById("btn-travel");
  const fpanel = document.getElementById("filter-panel");
  const backdrop = document.getElementById("panel-backdrop");
  const closeBtn = document.getElementById("filter-close");
  const travelPop = document.getElementById("travel-popover");

  const openFilter = () => {
    fpanel.classList.add("is-open");
    backdrop.classList.add("is-open");
    fpanel.setAttribute("aria-hidden", "false");
    filtersBtn.classList.add("is-active");
    filtersBtn.setAttribute("aria-expanded", "true");
  };
  closeFilterPanel = () => {
    fpanel.classList.remove("is-open");
    backdrop.classList.remove("is-open");
    fpanel.setAttribute("aria-hidden", "true");
    filtersBtn.classList.remove("is-active");
    filtersBtn.setAttribute("aria-expanded", "false");
  };

  filtersBtn.addEventListener("click", () => {
    if (fpanel.classList.contains("is-open")) closeFilterPanel(); else openFilter();
  });
  closeBtn.addEventListener("click", closeFilterPanel);
  backdrop.addEventListener("click", () => {
    closeFilterPanel();
    closeTravelDrawer();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeFilterPanel();
      closeTravelDrawer();
    }
  });

  const positionTravelPopover = () => {
    const rect = travelBtn.getBoundingClientRect();
    travelPop.style.top = (window.scrollY + rect.bottom + 8) + "px";
    // Anchor the popover's right edge to the button's right edge, but clamp to viewport.
    const popWidth = travelPop.offsetWidth || 360;
    const desiredLeft = window.scrollX + rect.right - popWidth;
    const minLeft = window.scrollX + 12;
    travelPop.style.left = Math.max(desiredLeft, minLeft) + "px";
  };
  const closeTravelDrawer = () => {
    travelPop.classList.remove("is-open");
    travelPop.setAttribute("aria-hidden", "true");
    travelBtn.classList.remove("is-active");
    travelBtn.setAttribute("aria-expanded", "false");
  };
  const openTravelDrawer = () => {
    travelPop.classList.add("is-open");
    travelPop.setAttribute("aria-hidden", "false");
    travelBtn.classList.add("is-active");
    travelBtn.setAttribute("aria-expanded", "true");
    positionTravelPopover();
  };
  travelBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (travelPop.classList.contains("is-open")) closeTravelDrawer(); else openTravelDrawer();
  });
  // Close when clicking outside the popover.
  document.addEventListener("click", (e) => {
    if (!travelPop.classList.contains("is-open")) return;
    if (travelPop.contains(e.target) || travelBtn.contains(e.target)) return;
    closeTravelDrawer();
  });
  window.addEventListener("resize", () => {
    if (travelPop.classList.contains("is-open")) positionTravelPopover();
  });
  window.addEventListener("scroll", () => {
    if (travelPop.classList.contains("is-open")) positionTravelPopover();
  }, { passive: true });
})();

render();
Promise.all([loadScores(), loadExtras(), loadFlags()]).then(render);
</script>
</body>
