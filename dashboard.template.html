<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SF Rentals Dashboard</title>
<style>
  :root {
    --bg: #eef3fb;
    --panel: #ffffff;
    --panel-2: #f3f7fd;
    --border: #cfdae8;
    --text: #0b2545;
    --muted: #5c7a99;
    --accent: #1e4d99;
    --accent-strong: #0b2545;
    --accent-2: #0e8f5d;
    --warn: #e58905;
    --danger: #d23b3b;
    --star: #f5b400;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px; line-height: 1.45; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header.topbar {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, #ffffff 0%, #ffffffee 100%);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    box-shadow: 0 1px 3px rgba(11, 37, 69, 0.05);
  }
  .title-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .title-row h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
  .stats { display: flex; gap: 12px; color: var(--muted); font-size: 11px; flex-wrap: wrap; }
  .stats b { color: var(--text); font-weight: 600; }

  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 6px 10px;
    margin-top: 6px;
  }
  .control { display: flex; flex-direction: column; gap: 2px; }
  .control label { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; }
  .control input, .control select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 3px 6px; font-size: 12px; outline: none;
    height: 26px;
  }
  .control input:focus, .control select:focus { border-color: var(--accent); }
  .control.range-row { flex-direction: row; gap: 4px; align-items: center; }
  .control.range-row .stack { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .control.range-row input { width: 100%; }

  .control.stacked { gap: 3px; }
  .control.stacked .inline-row { display: flex; align-items: center; gap: 6px; }
  .control.stacked .inline-row .mini {
    font-size: 10px; color: var(--muted); min-width: 34px;
  }
  .control.stacked .inline-row input,
  .control.stacked .inline-row select { flex: 1; height: 22px; font-size: 12px; }

  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 3px 10px; font-size: 12px; cursor: pointer;
    user-select: none;
  }
  .chip.active { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 600; }

  main { padding: 18px 20px 40px; }

  .grid {
    display: flex; flex-direction: column; gap: 8px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; flex-direction: row; gap: 16px; align-items: stretch;
    transition: border-color 120ms ease, box-shadow 120ms ease;
    box-shadow: 0 1px 2px rgba(11, 37, 69, 0.04);
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(30, 77, 153, 0.1); }
  .card .info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .card .score-panel {
    width: 360px; flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding-left: 14px;
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
  }
  @media (max-width: 820px) {
    .card { flex-direction: column; }
    .card .score-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 10px; }
  }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .addr { font-weight: 600; font-size: 14px; line-height: 1.35; }
  .addr .zip { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 4px; }
  .price { font-size: 20px; font-weight: 700; color: var(--accent-2); white-space: nowrap; }
  .price small { font-size: 12px; color: var(--muted); font-weight: 400; display: block; text-align: right; }

  .facts { display: flex; gap: 6px; flex-wrap: wrap; }
  .fact {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--muted);
  }
  .fact b { color: var(--text); font-weight: 600; }

  .commute-summary { display: flex; flex-direction: column; gap: 4px; }
  .commute-line {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    font-size: 12px;
    align-items: baseline;
  }
  .commute-line .dest { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .commute-line .m { font-variant-numeric: tabular-nums; color: var(--text); min-width: 42px; text-align: right; }
  .commute-line .m .unit { color: var(--muted); font-size: 11px; }
  .commute-line .m.na { color: #aab8cc; }

  .scores { display: flex; gap: 6px; flex-wrap: wrap; }
  .score {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--muted);
  }
  .score b { color: var(--text); }
  .score.good b { color: var(--accent-2); }
  .score.mid b { color: var(--warn); }
  .score.bad b { color: var(--danger); }

  .actions { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-top: 2px; }
  .actions .spacer { flex: 1; }
  .link-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .link-btn:hover { color: var(--accent); border-color: var(--accent); }

  .details { display: none; border-top: 1px solid var(--border); padding-top: 10px; gap: 10px; flex-direction: column; }
  .card.open .details { display: flex; }
  .card.open .toggle::after { content: "\u25B2"; }
  .toggle::after { content: "\u25BC"; margin-left: 6px; font-size: 10px; }

  .commute-grid {
    display: grid;
    grid-template-columns: 1fr repeat(3, auto);
    gap: 4px 12px;
    font-size: 12px;
    align-items: baseline;
  }
  .commute-grid .h { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .commute-grid .v { font-variant-numeric: tabular-nums; text-align: right; }
  .commute-grid .v.na { color: #aab8cc; }

  .desc {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-size: 12.5px; color: var(--text); white-space: pre-wrap;
    max-height: 260px; overflow-y: auto;
  }
  .desc.empty { color: var(--muted); font-style: italic; }

  .kv-grid {
    display: grid; grid-template-columns: max-content 1fr; gap: 4px 14px;
    font-size: 12px;
  }
  .kv-grid .k { color: var(--muted); }

  .count-line { color: var(--muted); font-size: 12px; margin: 10px 0 14px; }
  .empty-state {
    text-align: center; color: var(--muted); padding: 60px 20px;
    border: 1px dashed var(--border); border-radius: 10px;
  }

  .score-box { display: flex; flex-direction: column; gap: 4px; }
  .scorer-row {
    display: grid;
    grid-template-columns: 64px auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .scorer-row.me { background: var(--panel-2); }
  .scorer-row .scorer-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .score-stars { display: inline-flex; gap: 1px; }
  .star {
    font-size: 18px; line-height: 1; color: #c5d1e0;
    user-select: none; padding: 0 1px;
    transition: color 80ms ease;
  }
  .star.filled { color: var(--star); }
  .score-stars:not(.disabled) .star { cursor: pointer; }
  .score-stars.disabled .star { cursor: default; }
  .score-stars:not(.disabled) .star:hover { color: var(--star); }
  .scorer-note {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 3px 7px; font-size: 12px; outline: none;
    min-width: 0; width: 100%;
  }
  .scorer-note:focus { border-color: var(--accent); }
  .scorer-note.read-only {
    background: transparent; border: 1px dashed transparent;
    font-style: italic; color: var(--muted);
    padding: 3px 7px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .scorer-note.read-only.empty { color: #aab8cc; }

  .control.commute-filters {
    grid-column: span 2;
    gap: 2px;
  }
  .commute-row {
    display: grid;
    grid-template-columns: minmax(90px, 1fr) 1fr 1fr;
    gap: 4px;
    align-items: center;
  }
  .commute-row .dest-label {
    font-size: 10px; color: var(--text); font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .commute-row select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 5px; font-size: 11px; outline: none;
    width: 100%; height: 22px;
  }
  .commute-row select:focus { border-color: var(--accent); }
  @media (max-width: 600px) {
    .control.commute-filters { grid-column: span 1; }
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="title-row">
    <h1>SF Rentals Dashboard</h1>
    <div class="stats" id="stats"></div>
  </div>
  <div class="controls">
    <div class="control">
      <label>Search</label>
      <input id="f-search" type="text" placeholder="Address, neighborhood, broker…">
    </div>
    <div class="control stacked">
      <div class="inline-row">
        <span class="mini">Min $</span>
        <input id="f-price-min" type="number" min="0" step="100" placeholder="0">
      </div>
      <div class="inline-row">
        <span class="mini">Max $</span>
        <input id="f-price-max" type="number" min="0" step="100" placeholder="any">
      </div>
    </div>
    <div class="control stacked">
      <div class="inline-row">
        <span class="mini">Beds</span>
        <select id="f-beds">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
        </select>
      </div>
      <div class="inline-row">
        <span class="mini">Baths</span>
        <select id="f-baths">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
        </select>
      </div>
    </div>
    <div class="control">
      <label>Min stars</label>
      <select id="f-min-stars">
        <option value="">Any</option>
        <option value="1">≥ 1 ★</option>
        <option value="2">≥ 2 ★</option>
        <option value="3">≥ 3 ★</option>
        <option value="4">≥ 4 ★</option>
        <option value="5">5 ★</option>
      </select>
    </div>
    <div class="control">
      <label>Sort by</label>
      <select id="f-sort">
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
    </div>
    <div class="control">
      <label>I am</label>
      <select id="scorer-name">
        <option value="">— (read only)</option>
        <option value="Morten">Morten</option>
        <option value="Victoria">Victoria</option>
      </select>
    </div>
    <div class="control commute-filters" id="commute-filters"></div>
  </div>
</header>
<main>
  <div class="count-line" id="count-line"></div>
  <div class="grid" id="grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const RAW_DATA = /*__DATA_PLACEHOLDER__*/null;
const META = /*__META_PLACEHOLDER__*/null;

const SUPABASE_URL = "https://sklvnnnxcgnkbccvvwpx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrbHZubm54Y2dua2JjY3Z2d3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjc0MDIsImV4cCI6MjA5MTk0MzQwMn0.-I3mDHdYOxYv9WV6vrUQejTtd7uRYNP0rkR-GM6KRSU";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fmtPrice = (n) => n == null ? "—" :
  "$" + Math.round(n).toLocaleString();
const fmtMin = (n) => (n == null || isNaN(n)) ? null : (n < 10 ? n.toFixed(1) : Math.round(n).toString());
const fmtKm = (n) => (n == null || isNaN(n)) ? null : n.toFixed(1);

function num(row, key) {
  const v = row["_num:" + key];
  return (v === undefined || v === null) ? null : v;
}

function scoreClass(v) {
  if (v == null) return "";
  if (v >= 80) return "good";
  if (v >= 60) return "mid";
  return "bad";
}

const SCORERS = ["Morten", "Victoria"];

const _storedScorer = (localStorage.getItem("sf-scorer") || "").trim();
const state = {
  search: "",
  priceMin: null,
  priceMax: null,
  minBeds: null,
  minBaths: null,
  minStars: null,
  // destination -> { mode: "Drive"|"Transit"|"Walk", maxMinutes: number|null }
  commute: {},
  sort: "price-asc",
  openIds: new Set(),
  scorer: SCORERS.includes(_storedScorer) ? _storedScorer : "",
  // listing_id -> { scorer -> { score, notes, updated_at } }
  scores: new Map(),
};

async function loadScores() {
  const { data, error } = await db
    .from("scores")
    .select("listing_id, scorer, score, notes, updated_at");
  if (error) { console.error("loadScores failed:", error); return; }
  state.scores = new Map();
  for (const row of data || []) {
    if (!state.scores.has(row.listing_id)) state.scores.set(row.listing_id, new Map());
    state.scores.get(row.listing_id).set(row.scorer, row);
  }
}

async function saveScore(listingId, newScore) {
  const scorer = state.scorer;
  if (!scorer) { alert("Pick Morten or Victoria in the top bar first."); return; }
  if (!state.scores.has(listingId)) state.scores.set(listingId, new Map());
  const bucket = state.scores.get(listingId);
  const existing = bucket.get(scorer) || {};
  const score = newScore == null ? 0 : newScore;
  const notes = existing.notes || "";

  if (score === 0 && !notes) {
    bucket.delete(scorer);
    render();
    const { error } = await db.from("scores").delete().match({ listing_id: listingId, scorer });
    if (error) console.error("delete failed:", error);
  } else {
    const payload = { listing_id: listingId, scorer, score, notes, updated_at: new Date().toISOString() };
    bucket.set(scorer, payload);
    render();
    const { error } = await db.from("scores").upsert(payload, { onConflict: "listing_id,scorer" });
    if (error) console.error("upsert failed:", error);
  }
}

async function saveNote(listingId, notes) {
  const scorer = state.scorer;
  if (!scorer) return;
  if (!state.scores.has(listingId)) state.scores.set(listingId, new Map());
  const bucket = state.scores.get(listingId);
  const existing = bucket.get(scorer) || {};
  const score = existing.score || 0;
  const trimmed = (notes || "").trim();

  if (score === 0 && !trimmed) {
    if (!bucket.has(scorer)) return;
    bucket.delete(scorer);
    const { error } = await db.from("scores").delete().match({ listing_id: listingId, scorer });
    if (error) console.error("delete failed:", error);
    return;
  }

  const payload = { listing_id: listingId, scorer, score, notes: trimmed, updated_at: new Date().toISOString() };
  bucket.set(scorer, payload);
  const { error } = await db.from("scores").upsert(payload, { onConflict: "listing_id,scorer" });
  if (error) console.error("saveNote failed:", error);
}

// Build stable id per row (URL or fallback to index).
RAW_DATA.forEach((r, i) => { r._id = r["Listing URL"] || ("row-" + i); });

function computeStats(rows) {
  const prices = rows.map((r) => r._priceValue).filter((v) => v != null);
  prices.sort((a, b) => a - b);
  const median = prices.length ? prices[Math.floor(prices.length / 2)] : null;
  const avg = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : null;
  return {
    count: rows.length,
    median, avg,
    minP: prices[0] ?? null,
    maxP: prices[prices.length - 1] ?? null,
  };
}

function applyFilters() {
  const tokens = state.search.trim().toLowerCase().split(/\s+/).filter(Boolean);
  let rows = RAW_DATA.filter((r) => {
    if (tokens.length) {
      const hay = [
        r["Address"], r["Short Address"], r["Zip"],
        r["City"], r["County"], r["State"],
        r["Broker Name"], r["Listed By (Premium Data)"],
        r["Subdivision (Premium Data)"], r["Type"],
      ].filter(Boolean).join(" ").toLowerCase();
      if (!tokens.every((t) => hay.includes(t))) return false;
    }
    const p = r._priceValue;
    if (state.priceMin != null && (p == null || p < state.priceMin)) return false;
    if (state.priceMax != null && (p == null || p > state.priceMax)) return false;
    if (state.minBeds != null) {
      const b = num(r, "Beds");
      if (b == null || b < state.minBeds) return false;
    }
    if (state.minBaths != null) {
      const b = num(r, "Baths");
      if (b == null || b < state.minBaths) return false;
    }
    if (state.minStars != null && state.scorer) {
      const myScore = state.scores.get(r._id)?.get(state.scorer)?.score ?? 0;
      if (myScore < state.minStars) return false;
    }
    for (const dest of META.destinations) {
      const cfg = state.commute[dest];
      if (!cfg || cfg.maxMinutes == null) continue;
      const t = num(r, `${dest} - ${cfg.mode} Time (min)`);
      if (t == null || t > cfg.maxMinutes) return false;
    }
    return true;
  });

  const byPrice = (a, b) => {
    const va = a._priceValue; const vb = b._priceValue;
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return va - vb;
  };

  if (state.sort === "price-desc") rows.sort((a, b) => -byPrice(a, b));
  else rows.sort(byPrice);

  return rows;
}

function renderStats(visible) {
  const totalStats = computeStats(RAW_DATA);
  const vis = computeStats(visible);
  const el = document.getElementById("stats");
  const medianStr = vis.median != null ? fmtPrice(vis.median) : "—";
  el.innerHTML = `
    <span><b>${vis.count}</b> of ${totalStats.count} listings</span>
    <span>Median <b>${medianStr}</b></span>
    <span>Range <b>${fmtPrice(vis.minP)} – ${fmtPrice(vis.maxP)}</b></span>
  `;
}

function commuteSummary(r) {
  const minText = (v) => {
    const s = fmtMin(v);
    return s == null ? "—" : `${s}<span class="unit"> m</span>`;
  };
  const cellClass = (v) => v == null ? "m na" : "m";
  return META.destinations.map((d) => {
    const drive = num(r, `${d} - Drive Time (min)`);
    const walk = num(r, `${d} - Walk Time (min)`);
    const tr = num(r, `${d} - Transit Time (min)`);
    const shortLabel = d.replace(/ \([^)]+\)$/, "");
    return `<div class="commute-line" title="${escapeHtml(d)}">
      <span class="dest">${escapeHtml(shortLabel)}</span>
      <span class="${cellClass(drive)}" title="Drive">🚗 ${minText(drive)}</span>
      <span class="${cellClass(tr)}" title="Transit">🚆 ${minText(tr)}</span>
      <span class="${cellClass(walk)}" title="Walk">🚶 ${minText(walk)}</span>
    </div>`;
  }).join("");
}

function commuteFullGrid(r) {
  const header = `
    <div class="h"></div>
    <div class="h" style="text-align:right">Drive</div>
    <div class="h" style="text-align:right">Transit</div>
    <div class="h" style="text-align:right">Walk</div>
  `;
  const body = META.destinations.map((d) => {
    const cell = (mode) => {
      const t = num(r, `${d} - ${mode} Time (min)`);
      const km = num(r, `${d} - ${mode} Distance (km)`);
      if (t == null) return `<div class="v na">—</div>`;
      const kmStr = km != null ? ` <span style="color:var(--muted);font-size:11px">(${fmtKm(km)} km)</span>` : "";
      return `<div class="v">${fmtMin(t)} min${kmStr}</div>`;
    };
    return `
      <div style="color:var(--text)">${d}</div>
      ${cell("Drive")}
      ${cell("Transit")}
      ${cell("Walk")}
    `;
  }).join("");
  return `<div class="commute-grid">${header}${body}</div>`;
}

function scoreChips(r) {
  const items = [
    ["Walk", num(r, "Walk Score (Premium Data)")],
    ["Transit", num(r, "Transit Score (Premium Data)")],
    ["Bike", num(r, "Bike Score (Premium Data)")],
  ];
  return items.map(([label, v]) => {
    if (v == null) return "";
    return `<span class="score ${scoreClass(v)}">${label} <b>${Math.round(v)}</b></span>`;
  }).join("");
}

function description(r) {
  const raw = (r["Description (Premium Data)"] || "").trim();
  if (!raw) return `<div class="desc empty">No description available.</div>`;
  return `<div class="desc">${escapeHtml(raw)}</div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function kvRows(r) {
  const entries = [
    ["Type", r["Type"]],
    ["Status", r["Status"]],
    ["Year built", r["Year Built (Premium Data)"]],
    ["Zestimate", r["Zestimate"]],
    ["Rent Zestimate", r["Rent Zestimate"]],
    ["MLS Id", r["MLS Id"]],
    ["Broker", r["Broker Name"] || r["Listed By (Premium Data)"]],
    ["Neighborhood", r["Subdivision (Premium Data)"]],
    ["Date scraped", r["Date Scraped"]],
  ].filter(([, v]) => v && String(v).trim() !== "");
  if (!entries.length) return "";
  return `<div class="kv-grid">` +
    entries.map(([k, v]) => `<div class="k">${k}</div><div>${escapeHtml(String(v))}</div>`).join("") +
    `</div>`;
}

function mapLink(r) {
  const lat = num(r, "Latitude"), lng = num(r, "Longitude");
  if (lat == null || lng == null) return "";
  return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener" class="link-btn">Map</a>`;
}

function scoreWidget(r) {
  const bucket = state.scores.get(r._id) || new Map();
  const rows = SCORERS.map((name) => {
    const entry = bucket.get(name);
    const score = entry ? entry.score : 0;
    const note = entry && entry.notes ? entry.notes : "";
    const isMe = state.scorer === name;
    const stars = [1, 2, 3, 4, 5].map((n) => {
      const cls = `star${n <= score ? " filled" : ""}`;
      const attrs = isMe
        ? ` data-score="${n}" data-id="${escapeHtml(r._id)}"`
        : "";
      return `<span class="${cls}"${attrs} title="${n}/5">★</span>`;
    }).join("");
    const noteField = isMe
      ? `<input class="scorer-note" type="text" value="${escapeHtml(note)}" data-note-id="${escapeHtml(r._id)}" placeholder="Why this score…">`
      : `<div class="scorer-note read-only${note ? "" : " empty"}" title="${escapeHtml(note)}">${note ? escapeHtml(note) : "—"}</div>`;
    return `
      <div class="scorer-row ${isMe ? "me" : "other"}">
        <span class="scorer-name">${name}</span>
        <span class="score-stars ${isMe ? "" : "disabled"}">${stars}</span>
        ${noteField}
      </div>`;
  }).join("");
  return `<div class="score-box">${rows}</div>`;
}

function renderCard(r) {
  const beds = num(r, "Beds");
  const baths = num(r, "Baths");
  const sqft = num(r, "Footage");
  const ppsf = r["Price Per Sq. Ft."] || "";
  const url = r["Listing URL"] || "";
  const short = r["Short Address"] || r["Address"] || "(no address)";
  const zip = r["Zip"] || "";
  const isOpen = state.openIds.has(r._id);
  const facts = [
    beds != null ? `<span class="fact"><b>${beds}</b> bd</span>` : "",
    baths != null ? `<span class="fact"><b>${baths}</b> ba</span>` : "",
    sqft != null ? `<span class="fact"><b>${sqft.toLocaleString()}</b> sqft</span>` : "",
    ppsf ? `<span class="fact">${escapeHtml(ppsf)}/sqft</span>` : "",
    r["Type"] ? `<span class="fact">${escapeHtml(r["Type"])}</span>` : "",
  ].filter(Boolean).join("");

  return `
  <article class="card ${isOpen ? "open" : ""}" data-id="${escapeHtml(r._id)}">
    <div class="info">
      <div class="card-head">
        <div class="addr">${escapeHtml(short)}<span class="zip">${escapeHtml(zip)}</span></div>
        <div class="price">${fmtPrice(r._priceValue)}<small>${r._priceValue != null && r["Type"] === "APARTMENT" ? "per month" : ""}</small></div>
      </div>
      <div class="facts">${facts}</div>
      <div class="scores">${scoreChips(r)}</div>
      <div class="commute-summary">${commuteSummary(r)}</div>
      <div class="actions">
        ${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="link-btn">Zillow ↗</a>` : ""}
        ${mapLink(r)}
        <div class="spacer"></div>
        <button class="link-btn toggle" data-toggle="${escapeHtml(r._id)}">Details</button>
      </div>
      <div class="details">
        ${commuteFullGrid(r)}
        ${kvRows(r)}
        ${description(r)}
      </div>
    </div>
    <div class="score-panel">${scoreWidget(r)}</div>
  </article>`;
}

function render() {
  const visible = applyFilters();
  renderStats(visible);
  const grid = document.getElementById("grid");
  const countEl = document.getElementById("count-line");
  countEl.textContent = `Showing ${visible.length} listing${visible.length === 1 ? "" : "s"}.`;
  if (!visible.length) {
    grid.innerHTML = `<div class="empty-state">No listings match your filters.</div>`;
    return;
  }
  grid.innerHTML = visible.map(renderCard).join("");
  grid.querySelectorAll("[data-toggle]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-toggle");
      if (state.openIds.has(id)) state.openIds.delete(id); else state.openIds.add(id);
      render();
    });
  });
  grid.querySelectorAll(".star[data-score]").forEach((star) => {
    star.addEventListener("click", () => {
      const id = star.getAttribute("data-id");
      const n = Number(star.getAttribute("data-score"));
      const current = state.scores.get(id)?.get(state.scorer)?.score;
      saveScore(id, current === n ? null : n);
    });
  });
  grid.querySelectorAll(".scorer-note[data-note-id]").forEach((input) => {
    input.addEventListener("blur", () => {
      const id = input.getAttribute("data-note-id");
      const existing = state.scores.get(id)?.get(state.scorer)?.notes || "";
      if (input.value === existing) return;
      saveNote(id, input.value);
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    });
  });
}

const MAX_MIN_OPTIONS = [
  ["", "Any"], ["15", "≤ 15 min"], ["20", "≤ 20 min"],
  ["30", "≤ 30 min"], ["45", "≤ 45 min"], ["60", "≤ 60 min"],
];
const MODE_OPTIONS = ["Drive", "Transit", "Walk"];

function populateCommuteRows() {
  const wrap = document.getElementById("commute-filters");
  wrap.innerHTML = META.destinations.map((d) => {
    const cfg = state.commute[d] || { mode: "Drive", maxMinutes: null };
    const modeOpts = MODE_OPTIONS.map((m) =>
      `<option value="${m}"${cfg.mode === m ? " selected" : ""}>${m}</option>`
    ).join("");
    const minOpts = MAX_MIN_OPTIONS.map(([v, label]) =>
      `<option value="${v}"${String(cfg.maxMinutes ?? "") === v ? " selected" : ""}>${label}</option>`
    ).join("");
    const safe = escapeHtml(d);
    return `
      <div class="commute-row">
        <div class="dest-label">${safe}</div>
        <select data-dest="${safe}" data-role="mode">${modeOpts}</select>
        <select data-dest="${safe}" data-role="max">${minOpts}</select>
      </div>`;
  }).join("");
  wrap.querySelectorAll("select[data-dest]").forEach((sel) => {
    sel.addEventListener("input", (e) => {
      const dest = sel.getAttribute("data-dest");
      const role = sel.getAttribute("data-role");
      if (!state.commute[dest]) state.commute[dest] = { mode: "Drive", maxMinutes: null };
      if (role === "mode") state.commute[dest].mode = e.target.value;
      else state.commute[dest].maxMinutes = e.target.value ? Number(e.target.value) : null;
      render();
    });
  });
}

function wireControls() {
  const bind = (id, handler) => document.getElementById(id).addEventListener("input", handler);
  bind("f-search", (e) => { state.search = e.target.value; render(); });
  bind("f-price-min", (e) => { state.priceMin = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-price-max", (e) => { state.priceMax = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-beds", (e) => { state.minBeds = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-baths", (e) => { state.minBaths = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-min-stars", (e) => { state.minStars = e.target.value ? Number(e.target.value) : null; render(); });
  bind("f-sort", (e) => { state.sort = e.target.value; render(); });

  const scorer = document.getElementById("scorer-name");
  scorer.value = state.scorer;
  scorer.addEventListener("input", (e) => {
    state.scorer = e.target.value.trim();
    localStorage.setItem("sf-scorer", state.scorer);
    render();
  });
}

META.destinations.forEach((d) => {
  state.commute[d] = { mode: "Drive", maxMinutes: null };
});
populateCommuteRows();
wireControls();
render();
loadScores().then(render);
</script>
</body>
</html>
